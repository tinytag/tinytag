name: Tests
on: [push, pull_request]
permissions: {}
env:
  MIN_COVERAGE_PERCENTAGE: 100

jobs:
  tests:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: [
          '3.8', '3.9', '3.10', '3.11', '3.12', '3.13', '3.14', '3.15-dev',
          '3.14t', '3.15t-dev',
          'pypy-3.8', 'pypy-3.9', 'pypy-3.10', 'pypy-3.11-nightly'
        ]
        include:
          - os: ubuntu-22.04
            python: 3.7
          - os: macos-15-intel
            python: 3.7
          - os: windows-latest
            python: 3.7

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python }}
          cache: 'pip'

      - name: Install dependencies
        run: python -m pip install build flit .[tests]

      - name: PEP 8 style checks
        run: python -m pycodestyle .

      - name: Linting
        run: python -m pylint --recursive=y .

      - name: Typing (mypy)
        run: python -m mypy -p tinytag

      - name: Typing (pyright)
        run: python -m pyright

      - name: Unit tests
        run: python -m coverage run --parallel-mode -m unittest
        env:
          TINYTAG_DEBUG: true

      - name: Coverage report
        run: |
          coverage combine --keep --quiet
          coverage report
          coverage html --quiet

      - name: Build package
        run: python -m build

      - name: Build package without isolation
        run: python -m build --no-isolation

      - name: Upload coverage data
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-${{ matrix.os }}-${{ matrix.python }}
          include-hidden-files: true
          path: |
            .coverage.*
            htmlcov

  coverage:
    needs: tests
    runs-on: ubuntu-slim
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Download coverage data
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: coverage-*
          merge-multiple: true

      - name: Install dependencies
        run: python -m pip install coverage

      - name: Generate coverage report
        run: |
          coverage combine --quiet
          coverage html --quiet

      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: combined-coverage-report
          path: htmlcov

      - name: Show coverage report
        run: coverage report --fail-under=${MIN_COVERAGE_PERCENTAGE}
